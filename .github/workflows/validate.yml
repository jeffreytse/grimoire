name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all SKILL.md files
        run: bash scripts/validate-skill.sh --all

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run conformance test suite
        run: bash scripts/test-schema.sh
